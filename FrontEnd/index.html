<!DOCTYPE html>
<html>
<head>
  <title>Radiology Relevance Checker</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
    }
    textarea {
      width: 100%;
      height: 200px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Radiology Prior Study Relevance Checker</h2>

<p>Paste JSON input below:</p>

<textarea id="input">
{
  "cases": [
    {
      "case_id": "123",
      "current_study": {
        "study_description": "MRI brain without contrast",
        "study_date": "2021-05-10"
      },
      "prior_studies": [
        {
          "study_id": "a1",
          "study_description": "MRI brain with contrast",
          "study_date": "2019-03-01"
        }
      ]
    }
  ]
}
</textarea>

<br>

<button onclick="runAPI()">Run Prediction</button>

<h3>Output</h3>
<pre id="output"></pre>

<script>
async function runAPI() {
  const input = document.getElementById("input").value;

  const response = await fetch("https://patient-examination-api.onrender.com", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: input
  });

  const data = await response.json();

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
